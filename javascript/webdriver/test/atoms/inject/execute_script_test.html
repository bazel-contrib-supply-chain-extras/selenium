<html>
<head>
  <meta charset="utf-8">
  <title>execute_script_test.html</title>
  <link rel="stylesheet" href="/filez/_main/third_party/js/qunit/qunit.css">
  <script src="/filez/_main/third_party/js/qunit/qunit.js"></script>
  <script src="/filez/_main/third_party/js/qunit/qunit_test_runner.js"></script>
  <script src="../../test_bootstrap.js"></script>
  <script src="../../../atoms/inject/deps.js"></script>
  <script type="text/javascript">
    goog.require('goog.userAgent');
    goog.require('goog.userAgent.product');
    goog.require("webdriver.atoms.inject");
    goog.require("webdriver.atoms.inject.frame");
  </script>

  <script type="text/javascript">
    function isTestSkipped() {
      return goog.userAgent.IE || goog.userAgent.product.SAFARI;
    }

    function getValue(rawResult) {
      return goog.json.parse(rawResult).value;
    }

    QUnit.test('executeScriptWithWindow', function(assert) {
      if (isTestSkipped()) {
        assert.ok(true, 'Test skipped for IE/Safari');
        return;
      }
      var func = function () {return document.getElementById('bou').value;};
      var win = getValue(webdriver.atoms.inject.frame.findFrameByIdOrName("iframe"));
      assert.strictEqual(getValue(webdriver.atoms.inject.executeScript(func, [], win)), "there");
    });

    QUnit.test('executeScriptWithStringFunctionWithWindow', function(assert) {
      if (isTestSkipped()) {
        assert.ok(true, 'Test skipped for IE/Safari');
        return;
      }
      var func = "return document.getElementById('bou').value";
      var win = getValue(webdriver.atoms.inject.frame.findFrameByIdOrName("iframe"));
      assert.strictEqual(getValue(webdriver.atoms.inject.executeScript(func, [], win)), "there");
    });

    QUnit.test('executeScriptWithNullWindow', function(assert) {
      var func = function () {return document.getElementById('bou').value;};
      assert.strictEqual(getValue(webdriver.atoms.inject.executeScript(func, [], null)), "here");
    });

    QUnit.test('executeScriptWithoutWindow', function(assert) {
      var func = function () {return document.getElementById('bou').value;};
      assert.strictEqual(getValue(webdriver.atoms.inject.executeScript(func, [])), "here");
    });

    QUnit.test('canExecuteScriptsThatReturnPrimitives', function(assert) {
      var execute = webdriver.atoms.inject.executeScript;
      assert.strictEqual(getValue(execute('return 1 + 1;', [])), 2);
      assert.strictEqual(getValue(execute('return "hello";', [])), 'hello');
      assert.ok(getValue(execute('return true;', [])));
    });

    QUnit.test('canReturnElements', function(assert) {
      var execute = webdriver.atoms.inject.executeScript;
      var webElement = getValue(execute('return document.body', []));
      assert.strictEqual(bot.inject.cache.getElement(webElement['ELEMENT']), document.body);
    });
  </script>
</head>
<body>
  <div id="qunit"></div>
  <div id="qunit-fixture"></div>
  <p id="x" name="para">Para</p>
  <input type="text" id="bou" value="here"/>
  <iframe src="nested_iframes.html" id="iframe"></iframe>
  </body>
</html>
