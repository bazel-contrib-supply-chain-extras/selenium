<html>
<head>
  <meta charset="utf-8">
  <title>find_element_test.html</title>
  <link rel="stylesheet" href="/filez/_main/third_party/js/qunit/qunit.css">
  <script src="/filez/_main/third_party/js/qunit/qunit.js"></script>
  <script src="/filez/_main/third_party/js/qunit/qunit_test_runner.js"></script>
  <script src="../../test_bootstrap.js"></script>
  <script src="../../../atoms/inject/deps.js"></script>
  <script type="text/javascript">
    goog.require('bot.inject.cache');
    goog.require('bot.locators');
    goog.require('bot.response');
    goog.require('goog.dom');
    goog.require('goog.userAgent');
    goog.require('webdriver.atoms.inject.frame');
    goog.require('webdriver.atoms.inject.locators');
  </script>

  <script type="text/javascript">
    var wrappedDocument;

    QUnit.testStart(function() {
      if (document[bot.inject.cache.CACHE_KEY_]) {
        document[bot.inject.cache.CACHE_KEY_] = undefined;
      }

      wrappedDocument = {
        'ELEMENT': bot.inject.cache.addElement(document.body)
      };
    });

    function checkResponse(strResponse) {
      var response = goog.json.parse(strResponse);
      bot.response.checkResponse(response);
      return response['value'];
    }

    function getElementFromCache(parsed, opt_doc) {
      return bot.inject.cache.getElement(parsed.ELEMENT, opt_doc);
    }

    QUnit.test('injectFindElementById', function(assert) {
      var e = webdriver.atoms.inject.locators.findElement(
          'id', 'x', wrappedDocument);
      assert.strictEqual(
          getElementFromCache(checkResponse(e)),
          document.getElementById('x'));
    });

    QUnit.test('injectFindElementByCss', function(assert) {
      if (!document['querySelector']) {
        assert.ok(true, 'CSS locators are not supported.');
        return;
      }

      var e = webdriver.atoms.inject.locators.findElement(
          'css', '#wrong', wrappedDocument);
      assert.strictEqual(
          getElementFromCache(checkResponse(e)),
          document.querySelector('#wrong'));
    });

    QUnit.test('injectFindElementByClassName', function(assert) {
      var e = webdriver.atoms.inject.locators.findElement(
          'className', 'dogs', wrappedDocument);
      var expected = bot.locators.findElements({className: 'dogs'})[0];
      assert.strictEqual(getElementFromCache(checkResponse(e)), expected);
    });

    QUnit.test('injectFindElementByName', function(assert) {
      var e = webdriver.atoms.inject.locators.findElement(
          'name', 'after', wrappedDocument);
      assert.strictEqual(
          getElementFromCache(checkResponse(e)),
          bot.locators.findElements({name: 'after'})[0]);
    });

      QUnit.test('injectFindElementByLinkText', function(assert) {
      var e = webdriver.atoms.inject.locators.findElement(
          'linkText', 'this is a link', wrappedDocument);
      assert.strictEqual(
          getElementFromCache(checkResponse(e)),
          goog.dom.$('link'));
    });

    QUnit.test('injectFindElementByPartialLinkText', function(assert) {
      var e = webdriver.atoms.inject.locators.findElement(
          'partialLinkText', 'is', wrappedDocument);
      assert.strictEqual(
          getElementFromCache(checkResponse(e)),
          document.getElementById('link'));
    });

    QUnit.test('injectFindElementByTagName', function(assert) {
      var e = webdriver.atoms.inject.locators.findElement(
          'tagName', 'form', wrappedDocument);
      assert.strictEqual(
          getElementFromCache(checkResponse(e)),
          document.getElementsByTagName('form')[0]);
    });

    QUnit.test('injectFindElementByXpath', function(assert) {
      if (goog.userAgent.IE) {
        assert.ok(true, 'XPath not supported on IE');
        return;
      }

      var e = webdriver.atoms.inject.locators.findElement(
          'xpath', './/*[@id="after"]', wrappedDocument);
      assert.strictEqual(
          getElementFromCache(checkResponse(e)),
          document.getElementById('after'));
    });

    QUnit.test('injectFindElementsByTagName', function(assert) {
      // Search within the test-content container to exclude QUnit elements
      var testContentRef = {
        'ELEMENT': bot.inject.cache.addElement(document.getElementById('test-content'))
      };
      var e = webdriver.atoms.inject.locators.findElements('tagName', 'div', testContentRef);
      assert.strictEqual(checkResponse(e).length, 4);
    });

    QUnit.test('injectFindElementsByXPath', function(assert) {
      if (goog.userAgent.IE) {
        assert.ok(true, 'XPath not supported on IE');
        return;
      }

      // Search within the test-content container to exclude QUnit elements
      var testContentRef = {
        'ELEMENT': bot.inject.cache.addElement(document.getElementById('test-content'))
      };
      var e = webdriver.atoms.inject.locators.findElements('xpath', './/a', testContentRef);
      assert.strictEqual(checkResponse(e).length, 7);
    });

    QUnit.test('locatingAnElementInAnotherFrame', function(assert) {
      var response = webdriver.atoms.inject.frame.findFrameByIndex(0);
      var frameWindow = checkResponse(response);

      response = webdriver.atoms.inject.locators.findElement(
          'id', 'buttonText', null, frameWindow);
      var found = checkResponse(response);

      var el = getElementFromCache(found, window.frames[0].document);
      assert.strictEqual(el.tagName.toLowerCase(), 'strong');
      assert.strictEqual(el.id, 'buttonText');
    });

    QUnit.test('locatingAChildElementInAnotherFrame', function(assert) {
      var response = webdriver.atoms.inject.frame.findFrameByIndex(0);
      var frameWindow = checkResponse(response);

      response = webdriver.atoms.inject.locators.findElement(
          'id', 'buttonForm', null, frameWindow);
      var root = checkResponse(response);

      response = webdriver.atoms.inject.locators.findElement(
          'tag name', 'strong', root, frameWindow);
      var found = checkResponse(response);

      var el = getElementFromCache(found, window.frames[0].document);
      assert.strictEqual(el.tagName.toLowerCase(), 'strong');
      assert.strictEqual(el.id, 'buttonText');

      response = webdriver.atoms.inject.locators.findElement(
          'id', 'buttonText', null, frameWindow);
      var found = checkResponse(response);

      var el = getElementFromCache(found, window.frames[0].document);
      assert.strictEqual(el.tagName.toLowerCase(), 'strong');
      assert.strictEqual(el.id, 'buttonText');
    });

    QUnit.test('locatingManyElementsInAnotherFrame', function(assert) {
      var response = webdriver.atoms.inject.frame.findFrameByIndex(0);
      var frameWindow = checkResponse(response);

      response = webdriver.atoms.inject.locators.findElements(
          'tag name', 'form', null, frameWindow);
      var found = checkResponse(response);
      assert.strictEqual(found.length, 3);

      var doc = window.frames[0].document;
      assert.strictEqual(getElementFromCache(found[0], doc).id, 'form');
      assert.strictEqual(getElementFromCache(found[1], doc).id, 'otherForm');
      assert.strictEqual(getElementFromCache(found[2], doc).id, 'buttonForm');
    });
  </script>
</head>
<body>
  <div id="qunit"></div>
  <div id="qunit-fixture"></div>
  <div id="test-content">
    <p id="x" name="para">Para</p>

    <div name="after" id="wrong" class="feline cats">nope</div>
    <div name="right" id="after" class="dogs">yup</div>
    <div name="lion" class="cats">simba</div>
    <div name="tiger" class="cats">shere khan</div>

    <form action="#">
      <input name="after" /><br />
      <input name="foo" />
    </form>

    <!-- This comment should be ignored -->

    <span name="foo">Furrfu</span>

    <ul>
      <li id="illegal">item
      <li id="illegal">item
      <li id="illegal">item
      <li id="illegal">item
    </ul>

    <a id="link" href="#">this is a link</a>
    <a name="fishsticks">this is a link</a>
    <a href="#">this is a link</a>
    <a href="#">this is a link</a>
    <a href="#">this is a link</a>

    <a href="#">unrelated</a>
    <a href="#" id="empty-link"></a>

    <iframe id="frame" src="click_iframe.html"></iframe>
  </div>
  </body>
</html>
