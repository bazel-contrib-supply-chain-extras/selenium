<!DOCTYPE HTML>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML5 local storage</title>
  <link rel="stylesheet" href="/filez/_main/third_party/js/qunit/qunit.css">
  <script src="/filez/_main/third_party/js/qunit/qunit.js"></script>
  <script src="/filez/_main/third_party/js/qunit/qunit_test_runner.js"></script>
  <script src="../../test_bootstrap.js"></script>
  <script type="text/javascript">
    goog.require('bot.html5');
    goog.require('webdriver.atoms.storage.local');
  </script>

  <script type="text/javascript">
    QUnit.test('clear', function(assert) {
      if (!bot.html5.isSupported(bot.html5.API.LOCAL_STORAGE)) {
        assert.ok(true, 'Local storage not supported');
        return;
      }

      webdriver.atoms.storage.local.clear();
      assert.strictEqual(webdriver.atoms.storage.local.size(), 0);

      webdriver.atoms.storage.local.setItem('first', 'one');
      webdriver.atoms.storage.local.setItem('second', 'two');
      webdriver.atoms.storage.local.setItem('third', 'two');
      webdriver.atoms.storage.local.clear();
      assert.strictEqual(webdriver.atoms.storage.local.size(), 0);
      assert.strictEqual(webdriver.atoms.storage.local.getItem('first'), null);
      assert.strictEqual(webdriver.atoms.storage.local.getItem('second'), null);
      assert.strictEqual(webdriver.atoms.storage.local.getItem('third'), null);
    });

    QUnit.test('setAndGetSimpleItem', function(assert) {
      if (!bot.html5.isSupported(bot.html5.API.LOCAL_STORAGE)) {
        assert.ok(true, 'Local storage not supported');
        return;
      }

      webdriver.atoms.storage.local.clear();

      // set-get
      webdriver.atoms.storage.local.setItem('first', 'one');
      assert.strictEqual(webdriver.atoms.storage.local.getItem('first'), 'one');

      // resetItem
      webdriver.atoms.storage.local.setItem('first', '1');
      assert.strictEqual(webdriver.atoms.storage.local.getItem('first'), '1');

    });

    QUnit.test('removeItem', function(assert) {
      if (!bot.html5.isSupported(bot.html5.API.LOCAL_STORAGE)) {
        assert.ok(true, 'Local storage not supported');
        return;
      }

      webdriver.atoms.storage.local.clear();

      webdriver.atoms.storage.local.setItem('first', 'one');
      assert.strictEqual(webdriver.atoms.storage.local.removeItem('first'), 'one');

      assert.strictEqual(webdriver.atoms.storage.local.removeItem('first'), null);
      assert.strictEqual(webdriver.atoms.storage.local.removeItem('foo'), null);
    });

    QUnit.test('size', function(assert) {
      if (!bot.html5.isSupported(bot.html5.API.LOCAL_STORAGE)) {
        assert.ok(true, 'Local storage not supported');
        return;
      }

      webdriver.atoms.storage.local.clear();

      webdriver.atoms.storage.local.setItem('first', 'one');
      webdriver.atoms.storage.local.setItem('second', 'two');
      webdriver.atoms.storage.local.setItem('third', 'three');
      assert.strictEqual(webdriver.atoms.storage.local.size(), 3);
    });

    QUnit.test('keySet', function(assert) {
      if (!bot.html5.isSupported(bot.html5.API.LOCAL_STORAGE)) {
        assert.ok(true, 'Local storage not supported');
        return;
      }

      webdriver.atoms.storage.local.clear();

      webdriver.atoms.storage.local.setItem('third', 'three');
      webdriver.atoms.storage.local.setItem('first', 'one');
      webdriver.atoms.storage.local.setItem('second', 'two');

      // keySet
      var keys = webdriver.atoms.storage.local.keySet();
      var sortedKeys = keys.sort();
      assert.deepEqual(sortedKeys, ['first', 'second', 'third']);
    });
  </script>

</head>
<body>
<div id="qunit"></div>
<div id="qunit-fixture"></div>
</body>
</html>
