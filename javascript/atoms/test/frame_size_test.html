<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>frame_size_test</title>
  <link rel="stylesheet" href="/filez/_main/third_party/js/qunit/qunit.css">
  <script src="/filez/_main/third_party/js/qunit/qunit.js"></script>
  <script src="/filez/_main/third_party/js/qunit/qunit_test_runner.js"></script>
  <script src="test_bootstrap.js" type="text/javascript"></script>
  <script type="text/javascript">
    goog.require('bot');
    goog.require('bot.locators');
    goog.require('bot.userAgent');
    goog.require('bot.window');
    goog.require('goog.dom');
    goog.require('goog.math');
    goog.require('goog.userAgent');
  </script>
</head>
<body>
  <div id="qunit"></div>
  <div id="qunit-fixture"></div>
  <iframe id="frame" src="testdata/iframe_simple_page.html"></iframe>
  <script type="text/javascript">
    var frame = document.getElementById('frame');

    QUnit.testStart(function() {
      bot.setWindow(goog.dom.getFrameContentWindow(frame));
    });

    function verifySize(assert, expectedSize) {
      var actualSize = bot.window.getSize();
      assert.strictEqual(actualSize.width, expectedSize.width);
      assert.strictEqual(actualSize.height, expectedSize.height);
    }

    QUnit.test('FrameGetSizeWithZeroFrameBorder', function(assert) {
      frame.frameBorder = '0';
      frame.style.height = '100px';
      frame.style.width = '110px';
      verifySize(assert, new goog.math.Size(110, 100));
    });

    QUnit.test('FrameGetSizeWithNonZeroFrameBorder', function(assert) {
      frame.frameBorder = '1';
      frame.style.height = '100px';
      frame.style.width = '110px';
      verifySize(assert, new goog.math.Size(110, 100));
    });

    QUnit.test('FrameSetSize', function(assert) {
      var size = new goog.math.Size(200, 150);
      bot.window.setSize(size);
      verifySize(assert, size);
    });

    QUnit.test('FrameSetSizeUsingGetSize', function(assert) {
      var size = bot.window.getSize();
      bot.window.setSize(size);
      verifySize(assert, size);
    });
  </script>
</body>
</html>
