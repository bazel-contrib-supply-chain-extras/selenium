<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>color_test.html</title>
  <link rel="stylesheet" href="/filez/_main/third_party/js/qunit/qunit.css">
  <script src="/filez/_main/third_party/js/qunit/qunit.js"></script>
  <script src="/filez/_main/third_party/js/qunit/qunit_test_runner.js"></script>
  <script src="test_bootstrap.js"></script>
  <script>
    goog.require('goog.array');
    goog.require('bot.color');
    goog.require('goog.color.names');
  </script>
</head>
<body>
<div id="qunit"></div>
<div id="qunit-fixture"></div>
<script>
QUnit.test('standardize color should not convert non color properties', function(assert) {
  var nonColorProps = ['fontStyle', 'overflow', 'bottom'];
  for (var i = 0; i < nonColorProps.length; i++) {
    assert.strictEqual(bot.color.standardizeColor(nonColorProps[i],'red'), 'red');
  }
});

QUnit.test('standardize color should not convert invalid color properties', function(assert) {
  var badColors = ['#xxxxxx', '8899000', 'not_color', 'rgb(2555,0,0)',
      '(10%, 20%, 0004.01)','rgba(1,20,)', '(100%, 0%, 0.22222%, 1.1)',
      'hsla(2555,0,0, 0)'];
  for (var i = 0; i < badColors.length; i++) {
    assert.strictEqual(bot.color.standardizeColor('color', badColors[i]), badColors[i]);
  }
  var badColors2 = ['(100%, 0%, 0.22222%)','rgb(0.989898%, 0%,0%)',
      '(100%, 0%, 0.22222%, 1)','rgb(0.989898%, 0%,0%,0.222)',
      'hsl(25,100%,97%)','hsla(120, 0%, 0%, 1)', 'hsla(360,20%,0%,1)',
      'hsla(0,0%,50%,0.5)', 'HSLA(0, 55%, 0%, 0.6)',
      'hsla(0, 85%, 0%, 0.123456789)'];
  for (var i = 0; i < badColors2.length; i++) {
    assert.strictEqual(bot.color.standardizeColor('color', badColors2[i]), badColors2[i]);
  }
});

QUnit.test('standardize color should return RGBA string unchanged', function(assert) {
  assert.strictEqual(bot.color.standardizeColor('color','rgba(1,2,3,1)'), 'rgba(1, 2, 3, 1)');
});

QUnit.test('standardize background color should return RGBA string unchanged', function(assert) {
  assert.strictEqual(bot.color.standardizeColor('backgroundColor','rgba(1,2,3,1)'), 'rgba(1, 2, 3, 1)');
});

QUnit.test('standardize color should return RGB string as RGBA string', function(assert) {
  assert.strictEqual(bot.color.standardizeColor('color','rgb(1,2,3)'), 'rgba(1, 2, 3, 1)');
});

QUnit.test('standardize color should return named color string as RGBA string', function(assert) {
  assert.strictEqual(bot.color.standardizeColor('color','green'), 'rgba(0, 128, 0, 1)');
});

QUnit.test('standardize color should return hex color string as RGBA string', function(assert) {
  assert.strictEqual(bot.color.standardizeColor('color','#008000'), 'rgba(0, 128, 0, 1)');
  assert.strictEqual(bot.color.standardizeColor('color','008000'), 'rgba(0, 128, 0, 1)');
});
</script>
</body>
</html>
