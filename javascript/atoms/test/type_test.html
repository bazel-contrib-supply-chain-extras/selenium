<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>type_test</title>
  <link rel="stylesheet" href="/filez/_main/third_party/js/qunit/qunit.css">
  <script src="/filez/_main/third_party/js/qunit/qunit.js"></script>
  <script src="/filez/_main/third_party/js/qunit/qunit_test_runner.js"></script>
  <script src="test_bootstrap.js"></script>
  <script type="text/javascript">
    goog.require('bot.Keyboard');
    goog.require('bot.action');
    goog.require('bot.events');
    goog.require('bot.userAgent');
    goog.require('goog.Promise');
    goog.require('goog.events');
    goog.require('goog.events.EventType');
    goog.require('goog.events.KeyCodes');
    goog.require('goog.userAgent');
  </script>
  <script type="text/javascript">
    var INPUT_IDS = ['textbox', 'password', 'email', 'search', 'textarea'];

    var SELECTION_KEYS = [
      bot.Keyboard.Keys.BACKSPACE,
      bot.Keyboard.Keys.DELETE,
      bot.Keyboard.Keys.PAGE_UP,
      bot.Keyboard.Keys.PAGE_DOWN,
      bot.Keyboard.Keys.END,
      bot.Keyboard.Keys.HOME,
      bot.Keyboard.Keys.LEFT,
      bot.Keyboard.Keys.UP,
      bot.Keyboard.Keys.RIGHT,
      bot.Keyboard.Keys.DOWN,
    ];

    var ALT = bot.Keyboard.Keys.ALT;
    var BACKSPACE = bot.Keyboard.Keys.BACKSPACE;
    var CONTROL = bot.Keyboard.Keys.CONTROL;
    var DELETE = bot.Keyboard.Keys.DELETE;
    var ENTER = bot.Keyboard.Keys.ENTER;
    var LEFT = bot.Keyboard.Keys.LEFT;
    var META = bot.Keyboard.Keys.META;
    var RIGHT = bot.Keyboard.Keys.RIGHT;
    var SHIFT = bot.Keyboard.Keys.SHIFT;
    var HOME = bot.Keyboard.Keys.HOME;
    var END = bot.Keyboard.Keys.END;

    function setUpPage() {
      for (var i = 0; i < INPUT_IDS.length; i++) {
        var input = document.getElementById(INPUT_IDS[i]);
        goog.events.listen(input, 'input', incrInputCount);
        goog.events.listen(input, 'propertychange', incrInputCount);
        goog.events.listen(input, 'textInput', incrTextInputCount);
      }
    }

    function incrInputCount() {
      var inputCountBox = document.getElementById('inputCount');
      inputCountBox.value = parseInt(inputCountBox.value) + 1;
    }

    function incrTextInputCount() {
      var textInputCountBox = document.getElementById('textInputCount');
      textInputCountBox.value = parseInt(textInputCountBox.value) + 1;
    }

    function runTypingTest(assert, input, opt_finalValue, opt_inputCount,
      opt_textInputCount, opt_inputIds, opt_initValue) {
      var inputIds = opt_inputIds ? opt_inputIds : INPUT_IDS;
      var inputCountBox = document.getElementById('inputCount');
      var textInputCountBox = document.getElementById('textInputCount');
      var finalValue = opt_finalValue !== undefined ? opt_finalValue : input;
      var inputCount =
        opt_inputCount !== undefined ? opt_inputCount : finalValue.length;
      var textInputCount =
        opt_textInputCount !== undefined ? opt_textInputCount : inputCount;
      var initValue = opt_initValue || '';

      var needsSelection = function (input) {
        if (Array.isArray(input)) {
          return goog.array.some(input, needsSelection);
        }
        return goog.array.contains(SELECTION_KEYS, input);
      }
      var requiresSelection = goog.array.some(input, needsSelection);

      for (var i = 0; i < inputIds.length; i++) {
        var inputBox = document.getElementById(inputIds[i]);
        if (requiresSelection && !bot.Keyboard.supportsSelection(inputBox)) {
          continue;
        }
        inputBox.value = initValue;
        inputCountBox.value = '0';
        textInputCountBox.value = '0';
        bot.action.type(inputBox, input);
        assert.strictEqual(inputBox.value, finalValue);

        if (goog.userAgent.IE) {
          assert.ok(inputCount - 4 < parseInt(inputCountBox.value));
          assert.ok(inputCount + 1 >= parseInt(inputCountBox.value));
        } else {
          assert.strictEqual(parseInt(inputCountBox.value), inputCount);
        }

        if (goog.userAgent.WEBKIT) {
          assert.strictEqual(parseInt(textInputCountBox.value), textInputCount);
        } else {
          assert.strictEqual(parseInt(textInputCountBox.value), 0);
        }
      }
    }

    QUnit.begin(function() {
      setUpPage();
    });

    QUnit.testStart(function() {
      // Reset input values before each test (but NOT disabled/readOnly state
      // as that can race with async tests that modify these properties)
      for (var i = 0; i < INPUT_IDS.length; i++) {
        var input = document.getElementById(INPUT_IDS[i]);
        if (input) {
          input.value = '';
          if (document.activeElement === input) {
            input.blur();
          }
        }
      }
      var hiddenInput = document.getElementById('hiddenInput');
      if (hiddenInput) {
        hiddenInput.value = '';
        if (document.activeElement === hiddenInput) {
          hiddenInput.blur();
        }
      }
    });

    QUnit.test('lowerCase', function(assert) {
      runTypingTest(assert, 'abcdefghijklmnopqrstuvwxyz');
    });

    QUnit.test('upperCase', function(assert) {
      runTypingTest(assert, 'ABCDEFGHIJKLMNOPQRSTUVWXYZ');
    });

    QUnit.test('numbers', function(assert) {
      runTypingTest(assert, '1234567890');
    });

    QUnit.test('symbols', function(assert) {
      runTypingTest(assert, '`~!@#$%^&*()-_=+[{]}\\|;:\'"",<.>/?');
    });

    QUnit.test('leftRight', function(assert) {
      runTypingTest(assert, ['aaaa', LEFT, LEFT, 'bb', RIGHT, 'c'], 'aabbaca');
    });

    QUnit.test('leftRightBounds', function(assert) {
      runTypingTest(assert, [LEFT, LEFT, 'b',
        LEFT, LEFT, 'a',
        RIGHT, 'c',
        RIGHT, RIGHT, RIGHT, 'e',
        LEFT, 'd'],
        'abcde');
    });

    QUnit.test('numPad', function(assert) {
      runTypingTest(assert, [bot.Keyboard.Keys.NUM_ZERO,
      bot.Keyboard.Keys.NUM_ONE,
      bot.Keyboard.Keys.NUM_TWO,
      bot.Keyboard.Keys.NUM_THREE,
      bot.Keyboard.Keys.NUM_FOUR,
      bot.Keyboard.Keys.NUM_FIVE,
      bot.Keyboard.Keys.NUM_SIX,
      bot.Keyboard.Keys.NUM_SEVEN,
      bot.Keyboard.Keys.NUM_EIGHT,
      bot.Keyboard.Keys.NUM_NINE,
      bot.Keyboard.Keys.NUM_MULTIPLY,
      bot.Keyboard.Keys.NUM_PLUS,
      bot.Keyboard.Keys.NUM_MINUS,
      bot.Keyboard.Keys.NUM_PERIOD,
      bot.Keyboard.Keys.NUM_DIVISION],
        '0123456789*+-./');
    });

    QUnit.test('unknownChar', function(assert) {
      runTypingTest(assert, '\u7231');
    });

    QUnit.test('backspace', function(assert) {
      runTypingTest(assert, ['abcd', BACKSPACE], 'abc', 5, 4);
      runTypingTest(assert, ['abcd', LEFT, BACKSPACE, BACKSPACE, 'e'], 'aed', 7, 5);

      var inputs = goog.userAgent.GECKO ? 5 : 4;
      runTypingTest(assert, ['ab', LEFT, BACKSPACE, BACKSPACE, 'c'], 'cb', inputs, 3);
    });

    QUnit.test('shiftNavigation', function(assert) {
      if (goog.userAgent.GECKO && !bot.userAgent.isEngineVersion(11)) {
        assert.ok(true, 'Skipping: GECKO <= 10');
        return;
      }
      runTypingTest(assert, ['axyz', SHIFT, LEFT, LEFT, LEFT, 'Bcd'], 'aBCD', 7);
    });

    QUnit.test('delete', function(assert) {
      runTypingTest(assert, ['abcd', LEFT, LEFT, DELETE, 'e'], 'abed', 6, 5);

      if (goog.userAgent.GECKO && !bot.userAgent.isEngineVersion('1.9.1')) {
        var inputIds = ['textbox', 'password'];
        runTypingTest(assert, ['abcd', DELETE, DELETE], 'abcd', 6, 4, inputIds);
        inputIds = ['textarea'];
        runTypingTest(assert, ['abcd', DELETE, DELETE], 'abcd', 4, 4, inputIds);
      } else {
        runTypingTest(assert, ['abcd', DELETE, DELETE], 'abcd', 4);
      }
    });

    QUnit.test('shiftDelete', function(assert) {
      if (goog.userAgent.GECKO && !bot.userAgent.isEngineVersion(11)) {
        assert.ok(true, 'Skipping: GECKO <= 10');
        return;
      }
      runTypingTest(assert, ['abcd', HOME, SHIFT, END, DELETE], '', 5, 4);
      runTypingTest(assert, ['abcd', HOME, RIGHT, SHIFT, END, DELETE], 'a', 5, 4);
      runTypingTest(assert, ['abcd', HOME, END, LEFT, SHIFT, HOME, DELETE], 'd', 5, 4);
      runTypingTest(assert, ['abcd', SHIFT, LEFT, LEFT, LEFT, DELETE], 'a', 5, 4);
      runTypingTest(assert,
        ['abcd', HOME, SHIFT, RIGHT, RIGHT, RIGHT, DELETE], 'd', 5, 4);
    });

    QUnit.test('eventCancel', function(assert) {
      function cancelEvent(element, eventType, keyCode) {
        var listener = function (event) {
          var code = event.keyCode || event.charCode;
          if (code == keyCode) {
            event.preventDefault();
          }
        };
        return goog.events.listen(element, eventType, listener);
      }
      var listenerKeys = [];
      for (var i = 0; i < INPUT_IDS.length; i++) {
        var element = document.getElementById(INPUT_IDS[i]);
        listenerKeys.push(cancelEvent(element, goog.events.EventType.KEYDOWN,
          goog.events.KeyCodes.E));
        listenerKeys.push(cancelEvent(element, goog.events.EventType.KEYPRESS,
          'f'.charCodeAt(0)));
      }

      runTypingTest(assert, 'abcdef', 'abcd');
      for (var i = 0; i < listenerKeys.length; i++) {
        goog.events.unlistenByKey(listenerKeys[i]);
      }
    });

    function runToggleTest(input) {
      function setupSingleToggleListener(history, key) {
        var listenerKey = (goog.events.listen(
          document.getElementById('textbox'),
          goog.events.EventType.KEYPRESS,
          function (event) {
            history[key].push(event[key + 'Key']);
          }));
        return listenerKey;
      }

      function setupAllToggleListeners(listenerKeys) {
        var history = { alt: [], ctrl: [], meta: [], shift: [] };
        for (var key in history) {
          listenerKeys.push(setupSingleToggleListener(history, key));
        }
        return history;
      }

      var listenerKeys = [];
      var history = setupAllToggleListeners(listenerKeys);
      try {
        var textBox = document.getElementById('textbox');
        bot.action.type(textBox, input);
      } finally {
        for (var i = 0; i < listenerKeys.length; i++) {
          goog.events.unlistenByKey(listenerKeys[i]);
        }
      }
      return history;
    }

    QUnit.test('toggleKeys', function(assert) {
      var history = runToggleTest(['ab', CONTROL, 'cd', SHIFT, 'ef']);
      assert.ok(goog.array.equals(
        [false, false, true, true, true, true], history['ctrl']));
      assert.ok(goog.array.equals(
        [false, false, false, false, true, true], history['shift']));

      history = runToggleTest(['ab', CONTROL, 'cd', CONTROL, 'ef']);
      assert.ok(goog.array.equals(
        [false, false, true, true, false, false], history['ctrl']));

      history = runToggleTest([ALT, 'a', SHIFT, 'b', ALT, 'c', SHIFT, 'd']);
      assert.ok(goog.array.equals(
        [true, true, false, false], history['alt']));
      assert.ok(goog.array.equals(
        [false, true, true, false], history['shift']));

      history = runToggleTest(['a', META, 'b']);

      if (goog.userAgent.GECKO) {
        assert.ok(goog.array.equals(
          [false, false, true], history['meta']));
      } else {
        assert.ok(goog.array.equals(
          [false, true], history['meta']));
      }
    });

    QUnit.test('enterNotTextArea', function(assert) {
      var inputIds = ['textbox', 'password'];
      runTypingTest(assert, ['asdf', ENTER, 'qwer'], 'asdfqwer', 8, 9, inputIds);
    });

    QUnit.test('enterTextArea', function(assert) {
      var newline = '\n';
      var finalText = 'asdf' + newline + 'qwer';
      runTypingTest(assert, ['asdf', ENTER, 'qwer'], finalText, 9, 9, ['textarea']);
    });

    QUnit.test('typingAppends', function(assert) {
      runTypingTest(assert, 'b', 'ab', 1, 1, INPUT_IDS, 'a');
    });

    QUnit.test('canTypeInHiddenElementWhenInFocus', function(assert) {
      var input = document.getElementById('hiddenInput');
      input.focus();
      assert.notOk(bot.dom.isShown(input));
      assert.strictEqual(bot.dom.getActiveElement(input), input);
      bot.action.type(input, 'a');
      assert.strictEqual(input.value, 'a');
    });

    QUnit.test('cannotTypeInHiddenElementWhenNotInFocus', function(assert) {
      document.getElementById('textbox').focus();
      var input = document.getElementById('hiddenInput');
      assert.notOk(bot.dom.isShown(input));
      assert.notStrictEqual(bot.dom.getActiveElement(input), input);
      assert.throws(goog.partial(bot.action.type, input, 'a'));
    });

    QUnit.test('cannotTypeInDisabledElement', function(assert) {
      var done = assert.async();
      var i;
      for (i = 0; i < INPUT_IDS.length; i++) {
        var input = document.getElementById(INPUT_IDS[i]);
        input.disabled = true;
      }
      yieldInIE7().then(function () {
        for (var j = 0; j < INPUT_IDS.length; j++) {
          var input = document.getElementById(INPUT_IDS[j]);
          assert.ok(input.disabled, INPUT_IDS[j] + ' should be disabled');
          var threw = false;
          try {
            bot.action.type(input, 'a');
          } catch (e) {
            threw = true;
          }
          assert.ok(threw, 'Should throw for disabled ' + INPUT_IDS[j]);
          input.disabled = false;
        }
        return yieldInIE7();
      }).then(done);
    });

    QUnit.test('typingInReadOnlyInputDoesNotAddText', function(assert) {
      var done = assert.async();
      for (var i = 0; i < INPUT_IDS.length; i++) {
        var input = document.getElementById(INPUT_IDS[i]);
        input.readOnly = true;
      }
      yieldInIE7().then(function () {
        runTypingTest(assert, 'text not added', '', 0, 0, ['textbox']);
        for (var i = 0; i < INPUT_IDS.length; i++) {
          var input = document.getElementById(INPUT_IDS[i]);
          input.readOnly = false;
        }
        return yieldInIE7();
      }).then(done);
    });

    function yieldInIE7() {
      return new goog.Promise(function (done) {
        if (goog.userAgent.IE && !bot.userAgent.isEngineVersion(8)) {
          setTimeout(done, 500);
        } else {
          done();
        }
      });
    }

    QUnit.test('persistentModifiers', function(assert) {
      var keyboard = new bot.Keyboard();
      var persitModifierKeys = true;

      var textBox = document.getElementById('textbox');
      textBox.value = '';
      bot.action.type(textBox, ['abcd', SHIFT, 'ef'], keyboard,
        persitModifierKeys);

      assert.strictEqual(textBox.value, 'abcdEF');
      assert.notOk(keyboard.isPressed(ALT));
      assert.notOk(keyboard.isPressed(CONTROL));
      assert.notOk(keyboard.isPressed(META));
      assert.ok(keyboard.isPressed(SHIFT));

      bot.action.type(textBox, [LEFT, 'ghi', SHIFT, 'j'], keyboard,
        persitModifierKeys);

      if (goog.userAgent.GECKO && !bot.userAgent.isEngineVersion(17)) {
        assert.strictEqual(textBox.value, 'abcdEGHIjF');
      } else {
        assert.strictEqual(textBox.value, 'abcdEGHIj');
      }

      assert.notOk(keyboard.isPressed(ALT));
      assert.notOk(keyboard.isPressed(CONTROL));
      assert.notOk(keyboard.isPressed(META));
      assert.notOk(keyboard.isPressed(SHIFT));
    });
  </script>
</head>

<body>
  <div id="qunit"></div>
  <div id="qunit-fixture"></div>
  The last textbox displays how often some of the events of the first textbox
  fire. <br>
  <form action="" onsubmit="return false;">
    <input type="text" id="textbox" />
    <input type="password" id="password" />
    <input type="email" id="email" />
    <input type="search" id="search" />
    <textarea id="textarea"></textarea>
    <input type="text" id="inputCount" />
    <input type="text" id="textInputCount" />
    <div style="width:0px;height:0px;overflow:hidden;">
      <input type="text" id="hiddenInput" />
    </div>

    <div contenteditable="true">Hello</div>
  </form>
</body>

</html>
