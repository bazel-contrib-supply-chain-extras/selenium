<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>window_scroll_into_view_test</title>
<link rel="stylesheet" href="/filez/_main/third_party/js/qunit/qunit.css">
<script src="/filez/_main/third_party/js/qunit/qunit.js"></script>
<script src="/filez/_main/third_party/js/qunit/qunit_test_runner.js"></script>
<script src="test_bootstrap.js"></script>
<script type="text/javascript">
  goog.require('bot.userAgent');
  goog.require('bot.window');
  goog.require('goog.dom');
  goog.require('goog.math.Coordinate');
  goog.require('goog.userAgent');
  goog.require('goog.userAgent.product');
</script>
<body>
<div id="qunit"></div>
<div id="qunit-fixture"></div>
<script type="text/javascript">
  function shouldRunTests() {
    // Safari 6 applies scroll effects asynchronously.
    // Scroll offsets are not reliable on mobile viewports or IE6.
    return !bot.userAgent.SAFARI_6 && !bot.userAgent.MOBILE &&
        !(goog.userAgent.IE && !bot.userAgent.isProductVersion(7));
  }

  QUnit.testStart(function() {
    window.scrollTo(0, 0);
  });

  QUnit.done(function() {
    // So we can see the test results
    window.scrollTo(0, 0);
  });

  QUnit.test('scrollToPositionAlreadyInViewDoesNotChangeScrollPosition', function(assert) {
    if (!shouldRunTests()) {
      assert.ok(true, 'Skipping: browser not supported');
      return;
    }
    var preScroll = goog.dom.getDocumentScroll();
    bot.window.scrollIntoView(new goog.math.Coordinate(1, 1));
    var postScroll = goog.dom.getDocumentScroll();
    assert.ok(goog.math.Coordinate.equals(preScroll, postScroll));
  });

  QUnit.test('scrollOutOfViewportInXChangesScrollXPosition', function(assert) {
    if (!shouldRunTests()) {
      assert.ok(true, 'Skipping: browser not supported');
      return;
    }
    var viewport = goog.dom.getViewportSize();
    bot.window.scrollIntoView(new goog.math.Coordinate(viewport.width + 100, 0));
    var afterPositiveScroll = goog.dom.getDocumentScroll();
    assert.ok(0 < afterPositiveScroll.x);
    assert.strictEqual(afterPositiveScroll.y, 0);

    bot.window.scrollIntoView(new goog.math.Coordinate(50, 0));
    var afterNegativeScroll = goog.dom.getDocumentScroll();
    assert.ok(afterPositiveScroll.x > afterNegativeScroll.x);
    assert.ok(0 < afterNegativeScroll.x);
    assert.strictEqual(afterNegativeScroll.y, 0);
  });

  QUnit.test('scrollOutOfViewportInYChangesScrollXPosition', function(assert) {
    if (!shouldRunTests()) {
      assert.ok(true, 'Skipping: browser not supported');
      return;
    }
    var viewport = goog.dom.getViewportSize();
    bot.window.scrollIntoView(new goog.math.Coordinate(0, viewport.height + 100));
    var afterPositiveScroll = goog.dom.getDocumentScroll();
    assert.ok(0 < afterPositiveScroll.y);
    assert.strictEqual(afterPositiveScroll.x, 0);

    bot.window.scrollIntoView(new goog.math.Coordinate(0, 50));
    var afterNegativeScroll = goog.dom.getDocumentScroll();
    assert.ok(afterPositiveScroll.y > afterNegativeScroll.y);
    assert.ok(0 < afterNegativeScroll.y);
    assert.strictEqual(afterNegativeScroll.x, 0);
  });

  QUnit.test('scrollOutOfDocumentRaisesError', function(assert) {
    if (!shouldRunTests()) {
      assert.ok(true, 'Skipping: browser not supported');
      return;
    }
    assertScrollIntoViewRaises(-100, 0);
    assertScrollIntoViewRaises(0, -100);
    assertScrollIntoViewRaises(10000, 0);
    assertScrollIntoViewRaises(0, 10000);

    function assertScrollIntoViewRaises(x, y) {
      var coord = new goog.math.Coordinate(x, y);
      assert.throws(function() {
        bot.window.scrollIntoView(coord);
      });
    }
  });
</script>
<div style="width:8000px;height:8000px"></div>
</body>
</html>
